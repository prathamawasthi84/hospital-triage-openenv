# ──────────────────────────────────────────
# OpenEnv Environment Configuration
# Validated by: openenv validate
# ──────────────────────────────────────────

name: hospital-triage-openenv
version: "1.0.0"
description: >
  A real-world hospital emergency triage environment
  where an AI agent learns to prioritize patients,
  allocate limited resources, and manage dynamic
  conditions including patient deterioration and
  mass casualty incidents.

author: "Pratham Awasthi"
license: MIT
tags:
  - openenv
  - healthcare
  - triage
  - reinforcement-learning
  - real-world

# ──────────────────────────────────────────
# SERVER CONFIG
# ──────────────────────────────────────────

server:
  port: 8004
  base_path: /docs
  framework: fastapi

# ──────────────────────────────────────────
# OBSERVATION SPACE
# what the agent sees each step
# ──────────────────────────────────────────

observation_space:
  type: object
  properties:
    current_patient:
      type: object
      description: Patient agent must triage right now
      properties:
        id:
          type: string
        age:
          type: integer
          minimum: 0
          maximum: 120
        blood_pressure:
          type: string
          example: "180/110"
        heart_rate:
          type: integer
          minimum: 0
          maximum: 300
        oxygen_saturation:
          type: number
          minimum: 0.0
          maximum: 100.0
        symptoms:
          type: array
          items:
            type: string
        wait_time:
          type: integer
          description: Minutes patient has been waiting
        deteriorating:
          type: boolean
          description: Is patient getting worse each step
    queue:
      type: array
      description: Other patients currently waiting
      items:
        type: object
    resources:
      type: object
      description: Available hospital resources
      properties:
        ICU_beds:
          type: integer
        general_beds:
          type: integer
        doctors:
          type: integer
        OR_rooms:
          type: integer
        blood_supply:
          type: string
          enum: [normal, low, critical]
    step:
      type: integer
      description: Current step number
    max_steps:
      type: integer
      description: Total steps in episode
    task_level:
      type: string
      enum: [easy, medium, hard]
    message:
      type: string
      description: Context message for agent

# ──────────────────────────────────────────
# ACTION SPACE
# what the agent must return each step
# ──────────────────────────────────────────

action_space:
  type: object
  required:
    - patient_id
    - priority
    - ward
    - treatment
  properties:
    patient_id:
      type: string
      description: ID of patient being triaged
    priority:
      type: string
      enum: [immediate, urgent, non_urgent, deceased]
      description: >
        immediate = life threatening,
        urgent = serious but stable,
        non_urgent = minor,
        deceased = no intervention
    ward:
      type: string
      enum: [ICU, emergency, general, waiting]
      description: Ward to assign patient to
    treatment:
      type: string
      enum:
        - cardiac_protocol
        - trauma_protocol
        - respiratory_protocol
        - basic_care
        - observe_only
      description: Treatment protocol to apply
    reasoning:
      type: string
      description: >
        Agent reasoning — used for scoring
        in hard task only

# ──────────────────────────────────────────
# REWARD
# ──────────────────────────────────────────

reward:
  type: number
  minimum: 0.0
  maximum: 1.0
  description: >
    Partial reward given at every step.
    Not binary — agent gets credit for
    partially correct decisions.
  breakdown:
    priority_score:
      range: [0.0, 0.40]
      description: Correctness of priority assignment
    ward_score:
      range: [0.0, 0.30]
      description: Correctness of ward assignment
    treatment_score:
      range: [0.0, 0.30]
      description: Correctness of treatment protocol
    wait_time_penalty:
      range: [-0.10, 0.0]
      description: Penalty for excessive patient wait
    deterioration_penalty:
      range: [-0.30, 0.0]
      description: Penalty for ignoring critical patients

# ──────────────────────────────────────────
# TASKS
# ──────────────────────────────────────────

tasks:
  - id: easy
    name: Single Patient Triage
    description: >
      Agent receives one patient at a time with clear
      vitals and symptoms. Must assign correct priority,
      ward and treatment protocol.
    difficulty: easy
    max_steps: 10
    scoring:
      min: 0.0
      max: 1.0
    grader: rubrics.grade_easy
    example_score:
      random_agent: 0.25
      baseline_agent: TBD

  - id: medium
    name: Multi-Patient Queue Management
    description: >
      5 patients arrive simultaneously with only 2 ICU
      beds available. Agent must rank patients, allocate
      limited resources, and manage deterioration.
    difficulty: medium
    max_steps: 15
    scoring:
      min: 0.0
      max: 1.0
    grader: rubrics.grade_medium
    example_score:
      random_agent: 0.15
      baseline_agent: TBD

  - id: hard
    name: Mass Casualty Incident
    description: >
      15 casualties from a disaster. Resources critically
      scarce. Agent must apply START triage tags
      (black/red/yellow/green), allocate resources under
      pressure, and re-triage deteriorating patients.
    difficulty: hard
    max_steps: 20
    scoring:
      min: 0.0
      max: 1.0
    grader: rubrics.grade_hard
    example_score:
      random_agent: 0.10
      baseline_agent: TBD

# ──────────────────────────────────────────
# EPISODE CONFIG
# ──────────────────────────────────────────

episode:
  reset_on_done: true
  max_steps_per_task:
    easy: 10
    medium: 15
    hard: 20

# ──────────────────────────────────────────
# ENDPOINTS
# ──────────────────────────────────────────

endpoints:
  reset:
    method: POST
    path: /reset
    description: Start new episode, returns Observation
  step:
    method: POST
    path: /step
    description: Submit action, returns obs+reward+done+info
  state:
    method: GET
    path: /state
    description: Get full current environment state

# ──────────────────────────────────────────
# BASELINE
# ──────────────────────────────────────────

baseline:
  script: inference.py
  model: Qwen/Qwen2.5-72B-Instruct
  scores:
    easy: 0.910
    medium: 0.700
    hard: 0.691
